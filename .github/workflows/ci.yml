name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref so a fast push doesn't queue
# duplicate jobs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test-build:
    name: lint + typecheck + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (recursive · 7.11 enforcement)
        run: pnpm lint

      - name: Audit production deps (fail on high+)
        run: pnpm audit --prod --audit-level high

      - name: Typecheck (recursive)
        run: pnpm type-check

      - name: Test (recursive · 7.12 baseline)
        run: pnpm test

      - name: Build (recursive)
        run: pnpm build
        env:
          # Telemetry off so the runner doesn't ping Next on every CI run.
          NEXT_TELEMETRY_DISABLED: "1"

  e2e:
    name: playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Parallel to the main job · Playwright's webServer config boots its
    # own `pnpm dev` so we don't depend on the build artifact.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @e60/web exec playwright install --with-deps chromium

      - name: Run smoke tests
        run: pnpm --filter @e60/web test:e2e
        env:
          # Smoke test only hits /login → auth.getUser() short-circuits to
          # null user without an API call, so dummy-but-valid Supabase
          # creds are enough. When e2e grows to authenticated journeys,
          # swap these for repo secrets pointing at a sandbox project.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key-for-ci-smoke-only
          NEXT_TELEMETRY_DISABLED: "1"
          CI: "true"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
